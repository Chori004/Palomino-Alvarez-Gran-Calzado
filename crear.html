<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zapatilla, zapatos y más</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<div class="d-flex justify-content-center align-items-center vh-100">
  <div>


    <div class="d-flex align-items-center mb-3 gap-3">
      <label for="usuario2" style="width: 140px;">Nombre de usuario</label>
      <input type="text" id="usuario2" class="form-control" style="width: 200px;">

      <label for="contraseña" style="width: 90px;">Contraseña</label>
      <div class="input-group" style="width: 200px;">
        <input type="password" id="contraseña" class="form-control">
        <button class="btn btn-outline-secondary" type="button" onclick="togglePassword(this)">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    
    <div class="d-flex align-items-center mb-3 gap-3">
      <label for="email" style="width: 140px;">Email</label>
      <input type="text" id="email" class="form-control" style="width: 200px;">

      <label style="width: 90px;">Genero</label>
      <div class="d-flex gap-3">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
          <label class="form-check-label" for="radioDefault1">Hombre</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2">
          <label class="form-check-label" for="radioDefault2">Mujer</label>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  function togglePassword(btn) {
    const input = document.getElementById('contraseña');
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
